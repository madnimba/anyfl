dataset: UCI-MUSHROOM
k_clients: 2
seed: 42
aux_labeled_frac: 0.03
out_base: experiments/clustering/runs
export_cluster_dir: ./clusters
clustering:
  pretrain_epochs: 0
  supcon_epochs: 0
  batch_size: 256
  lr_pretrain: 0.001
  lr_supcon: 0.0001
  temperature: 0.2
  supcon_temperature: 0.17
  backend: bmm
  gmm_covariance: diag
  device: cpu
data:
  data_dir: ./data
  tabular_train_fraction: 0.85
